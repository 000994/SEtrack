DATA:
  MAX_SAMPLE_INTERVAL: 200
  MEAN:
  - 0.485
  - 0.456
  - 0.406
  SEARCH:
    CENTER_JITTER: 3
    FACTOR: 4.0
    SCALE_JITTER: 0.25
    SIZE: 256
    NUMBER: 1
  STD:
  - 0.229
  - 0.224
  - 0.225
  TEMPLATE:
    CENTER_JITTER: 0
    FACTOR: 2.0
    SCALE_JITTER: 0
    SIZE: 128
  TRAIN:
    DATASETS_NAME:
    - LASOT
    - GOT10K_vottrain
    - COCO17
    - TRACKINGNET
    DATASETS_RATIO:
    - 1
    - 1
    - 1
    - 1
    SAMPLE_PER_EPOCH: 60000
  VAL:
    DATASETS_NAME:
    - GOT10K_votval
    DATASETS_RATIO:
    - 1
    SAMPLE_PER_EPOCH: 10000
MODEL:
  # Phase 3: empty string = random init for profiling
  PRETRAIN_FILE: ""
  EXTRA_MERGER: False
  RETURN_INTER: False
  BACKBONE:
    TYPE: vit_base_patch16_224_setrack
    STRIDE: 16
    # ---- SETrack branch depths (Phase 4) ----
    TEMPLATE_BRANCH_DEPTH: 9
    SEARCH_SELF_DEPTH: 6
    CROSS_SEMANTIC_DEPTH: 3
    # ---- Phase 5: Shared self-attention blocks + Cross-layer semantic association ----
    SHARE_SELF_BLOCKS: True
    CROSS_PLACEHOLDER_TYPE: "no_param"
    # ---- Phase 6: Cross-layer semantic association + Redundant pruning ENABLED ----
    USE_CROSS_SEMANTIC: True
    CROSS_SEMANTIC_TYPE: "mhca"
    USE_REDUNDANT_PRUNING: True
    PRUNING_METHOD: "energy"
    PRUNING_ENERGY_RATIO: 0.7
    PRUNING_CENTER_RATIO: 0.5
    PRUNING_MIN_KEEP_RATIO: 0.5
    PRUNING_SIM_AGGREGATION: "mean"
    PRUNING_FILL_VALUE: "zero"
    PRUNING_RESTORE_FULL_TOKENS: True
    # ---- Candidate Elimination DISABLED ----
    CE_LOC: []
    CE_KEEP_RATIO: []
    CE_TEMPLATE_RANGE: 'ALL'
  HEAD:
    TYPE: CENTER
    NUM_CHANNELS: 256
TRAIN:
  BACKBONE_MULTIPLIER: 0.1
  DROP_PATH_RATE: 0.1
  # Phase 3: CE start/warm epochs are irrelevant but kept for config compat
  CE_START_EPOCH: 20
  CE_WARM_EPOCH: 80
  BATCH_SIZE: 32
  EPOCH: 300
  GIOU_WEIGHT: 2.0
  L1_WEIGHT: 5.0
  GRAD_CLIP_NORM: 0.1
  LR: 0.0004
  LR_DROP_EPOCH: 240
  NUM_WORKER: 10
  OPTIMIZER: ADAMW
  PRINT_INTERVAL: 50
  SCHEDULER:
    TYPE: step
    DECAY_RATE: 0.1
  VAL_EPOCH_INTERVAL: 20
  WEIGHT_DECAY: 0.0001
  AMP: False
TEST:
  EPOCH: 300
  SEARCH_FACTOR: 4.0
  SEARCH_SIZE: 256
  TEMPLATE_FACTOR: 2.0
  TEMPLATE_SIZE: 128
