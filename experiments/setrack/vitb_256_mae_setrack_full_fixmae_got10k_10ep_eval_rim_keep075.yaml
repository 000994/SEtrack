# RIM conservative A: energy=0.9, min_keep=0.75.
# Less aggressive pruning - keep at least 75% of tokens.

DATA:
  MAX_SAMPLE_INTERVAL: 200
  MEAN: [0.485, 0.456, 0.406]
  SEARCH: {CENTER_JITTER: 3, FACTOR: 4.0, SCALE_JITTER: 0.25, SIZE: 256, NUMBER: 1}
  STD: [0.229, 0.224, 0.225]
  TEMPLATE: {CENTER_JITTER: 0, FACTOR: 2.0, SCALE_JITTER: 0, SIZE: 128}
  TRAIN:
    DATASETS_NAME: [GOT10K_vottrain]
    DATASETS_RATIO: [1]
    SAMPLE_PER_EPOCH: 1000
  VAL:
    DATASETS_NAME: [GOT10K_votval]
    DATASETS_RATIO: [1]
    SAMPLE_PER_EPOCH: 180
MODEL:
  PRETRAIN_FILE: "mae_pretrain_vit_base.pth"
  EXTRA_MERGER: False
  RETURN_INTER: False
  BACKBONE:
    TYPE: vit_base_patch16_224_setrack
    STRIDE: 16
    TEMPLATE_BRANCH_DEPTH: 9
    SEARCH_SELF_DEPTH: 6
    CROSS_SEMANTIC_DEPTH: 3
    SHARE_SELF_BLOCKS: True
    CROSS_PLACEHOLDER_TYPE: "no_param"
    USE_CROSS_SEMANTIC: True
    CROSS_SEMANTIC_TYPE: "mhca"
    USE_REDUNDANT_PRUNING: True
    PRUNING_ENERGY_RATIO: 0.9
    PRUNING_CENTER_RATIO: 0.5
    PRUNING_MIN_KEEP_RATIO: 0.75
    PRUNING_SIM_AGGREGATION: "mean"
    PRUNING_FILL_VALUE: "zero"
    PRUNING_RESTORE_FULL_TOKENS: True
    CE_LOC: []
    CE_KEEP_RATIO: []
    CE_TEMPLATE_RANGE: 'ALL'
  HEAD: {TYPE: CENTER, NUM_CHANNELS: 256}
TRAIN:
  BACKBONE_MULTIPLIER: 0.1
  DROP_PATH_RATE: 0.1
  CE_START_EPOCH: 1
  CE_WARM_EPOCH: 10
  BATCH_SIZE: 4
  EPOCH: 10
  GIOU_WEIGHT: 2.0
  L1_WEIGHT: 5.0
  GRAD_CLIP_NORM: 0.1
  LR: 0.0004
  LR_DROP_EPOCH: 8
  NUM_WORKER: 0
  OPTIMIZER: ADAMW
  PRINT_INTERVAL: 20
  SCHEDULER: {TYPE: step, DECAY_RATE: 0.1}
  VAL_EPOCH_INTERVAL: 1
  WEIGHT_DECAY: 0.0001
  AMP: False
TEST:
  EPOCH: 10
  SEARCH_FACTOR: 4.0
  SEARCH_SIZE: 256
  TEMPLATE_FACTOR: 2.0
  TEMPLATE_SIZE: 128
  CHECKPOINT_CFG: vitb_256_mae_setrack_full_fixmae_got10k_10ep
