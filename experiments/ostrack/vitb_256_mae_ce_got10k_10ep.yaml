# OSTrack baseline 10-epoch GOT-10k training (Phase 11A).
# Same conditions as SETrack Phase 10 for fair comparison.
# Uses OSTrack's own CE mechanism (CE_LOC=[3,6,9], CE_KEEP_RATIO=[0.7,0.7,0.7]).

DATA:
  MAX_SAMPLE_INTERVAL: 200
  MEAN: [0.485, 0.456, 0.406]
  SEARCH: {CENTER_JITTER: 3, FACTOR: 4.0, SCALE_JITTER: 0.25, SIZE: 256, NUMBER: 1}
  STD: [0.229, 0.224, 0.225]
  TEMPLATE: {CENTER_JITTER: 0, FACTOR: 2.0, SCALE_JITTER: 0, SIZE: 128}
  TRAIN:
    DATASETS_NAME: [GOT10K_vottrain]
    DATASETS_RATIO: [1]
    SAMPLE_PER_EPOCH: 1000
  VAL:
    DATASETS_NAME: [GOT10K_votval]
    DATASETS_RATIO: [1]
    SAMPLE_PER_EPOCH: 180
MODEL:
  PRETRAIN_FILE: "mae_pretrain_vit_base.pth"
  EXTRA_MERGER: False
  RETURN_INTER: False
  BACKBONE:
    TYPE: vit_base_patch16_224_ce
    STRIDE: 16
    CE_LOC: [3, 6, 9]
    CE_KEEP_RATIO: [0.7, 0.7, 0.7]
    CE_TEMPLATE_RANGE: 'CTR_POINT'
  HEAD: {TYPE: CENTER, NUM_CHANNELS: 256}
TRAIN:
  BACKBONE_MULTIPLIER: 0.1
  DROP_PATH_RATE: 0.1
  CE_START_EPOCH: 1
  CE_WARM_EPOCH: 10
  BATCH_SIZE: 4
  EPOCH: 10
  GIOU_WEIGHT: 2.0
  L1_WEIGHT: 5.0
  GRAD_CLIP_NORM: 0.1
  LR: 0.0004
  LR_DROP_EPOCH: 8
  NUM_WORKER: 0
  OPTIMIZER: ADAMW
  PRINT_INTERVAL: 20
  SCHEDULER: {TYPE: step, DECAY_RATE: 0.1}
  VAL_EPOCH_INTERVAL: 1
  WEIGHT_DECAY: 0.0001
  AMP: False
TEST:
  EPOCH: 10
  SEARCH_FACTOR: 4.0
  SEARCH_SIZE: 256
  TEMPLATE_FACTOR: 2.0
  TEMPLATE_SIZE: 128
